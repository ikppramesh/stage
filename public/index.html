<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stage</title>
  <!-- Eye favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div id="app">

    <!-- ════════════════════ SIDEBAR ════════════════════ -->
    <aside id="sidebar">
      <!-- Stage logo replaces the old ⬡ hex glyph -->
      <div class="sidebar-brand">
        <img src="stage.png" alt="Stage" class="brand-logo"/>
      </div>

      <!-- Agent tree injected by JS -->
      <nav id="agent-tree"></nav>

      <div class="sidebar-bottom">
        <div class="conn-row">
          <span id="status-dot" class="sdot disconnected"></span>
          <span id="status-text">Connecting…</span>
        </div>
      </div>
    </aside>

    <!-- ════════════════════ MAIN ════════════════════ -->
    <div id="main">

      <!-- Top bar -->
      <header id="topbar">
        <div id="topbar-left">
          <span id="badge-emoji" class="tb-emoji"></span>
          <span id="badge-name"  class="tb-name">Stage</span>
          <span id="badge-phase" class="tb-phase" hidden></span>
        </div>
        <div id="topbar-right">
          <!-- Model pill -->
          <div id="model-pill" class="model-pill" hidden>
            <span class="model-dot"></span>
            <span id="model-name">—</span>
          </div>
          <!-- Token counter -->
          <div id="token-pill" class="token-pill" hidden>
            <span class="tok-icon">◈</span>
            <span id="tok-in"  title="Input tokens">0↑</span>
            <span class="tok-sep">·</span>
            <span id="tok-out" title="Output tokens">0↓</span>
            <span class="tok-sep">·</span>
            <span id="tok-calls" title="API calls">0 calls</span>
          </div>
          <button id="btn-clear" class="tb-btn" title="Clear chat">⌫ Clear</button>
        </div>
      </header>

      <!-- Chat area -->
      <div id="chat" role="log" aria-live="polite">
        <div id="welcome" class="welcome">
          <img src="stage.png" alt="Stage" class="welcome-logo"/>
          <p class="w-sub">Select an agent from the sidebar to begin.</p>
        </div>
      </div>

      <!-- Input -->
      <div id="composer">
        <!-- Slash-command palette (shown when user types "/") -->
        <div id="cmd-palette" class="cmd-palette" hidden></div>
        <div id="composer-box">
          <textarea
            id="user-input"
            placeholder="Select an agent to start…"
            rows="1"
            disabled
          ></textarea>
          <button id="btn-send" disabled>
            <svg viewBox="0 0 20 20" fill="currentColor">
              <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/>
            </svg>
          </button>
        </div>
        <p id="composer-hint">Enter to send · Shift+Enter for newline · Type <kbd>/</kbd> for skill commands</p>
      </div>

      <!-- Status bar (bottom) -->
      <div id="statusbar">
        <div id="sb-left">
          <span id="sb-model" class="sb-item">No model active</span>
        </div>
        <div id="sb-right">
          <span id="sb-session-tokens" class="sb-item" title="Session token usage">
            Session: <strong id="sb-tok-total">0</strong> tokens
          </span>
          <span class="sb-sep">·</span>
          <span id="sb-last-call" class="sb-item" title="Last call tokens">
            Last: <strong id="sb-tok-last">—</strong>
          </span>
          <span class="sb-sep">·</span>
          <span id="sb-calls" class="sb-item">
            <strong id="sb-ncalls">0</strong> calls
          </span>
        </div>
      </div>

    </div><!-- /#main -->
  </div><!-- /#app -->

  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/highlight.min.js"></script>
  <script src="js/agents-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
